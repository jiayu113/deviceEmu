version: '3.3'

services:
  emqx:
    image: emqx/emqx:5.8
    container_name: deviceemu-emqx
    ports:
      - "1883:1883"              # MQTT
      - "18083:18083"            # Dashboard(http://127.0.0.1:18083 默认 admin/public)
    restart: unless-stopped

  # FreeSWITCH 用 host 网络:SIP(5060)/RTP 端口全部直通 VM,无 NAT。
  # 这是 Linux Docker 专属能力,也是这次选 VM 的核心收益之一。
  freeswitch:
    image: safarov/freeswitch      # 免 SignalWire token、自带 vanilla 配置(分机 1000-1019 / 密码 1234)
    container_name: deviceemu-fs
    network_mode: host
    restart: unless-stopped
    # 首次启动慢,等 1-2 分钟再 fs_cli

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: deviceemu-prom
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"   

  grafana:
    image: grafana/grafana:11.2.0
    container_name: deviceemu-grafana
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin   
      - GF_AUTH_ANONYMOUS_ENABLED=true    
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    restart: unless-stopped